<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Notas de Viaje para un Rayito de Sol</title>
<meta name="description" id="pageDescription" content="Para Tanya, antes de su viaje a Perú.">

<!-- Google Fonts: Fraunces (display), Rye (stamp/ink text), Vollkorn (body), Space Mono (numbers/labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Rye&family=Vollkorn:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ===================================================================
   NOTAS DE VIAJE PARA UN RAYITO DE SOL
   Design tokens — vintage travel-poster / passport-stamp system
   =================================================================== */

:root {
  /* Color */
  --paper:        #EDE3CF;   /* aged paper background */
  --paper-deep:   #E3D5B8;   /* card / recessed paper */
  --paper-line:   #D9C8A5;   /* hairlines on paper */
  --ink-green:    #2F4B3C;   /* primary deep green (stamps, headers) */
  --ink-green-dk: #1F332A;   /* pressed/darker green */
  --gold:         #B8874F;   /* muted gold-brown ink accent */
  --stamp-red:    #9C4A36;   /* rare accent — PERÚ ink, notification dot */
  --text:         #2B231A;   /* near-black ink */
  --text-soft:    #5C4F3F;   /* softer ink for secondary text */
  --cream-on-green: #EFE6D2;

  /* Type */
  --font-display: 'Fraunces', serif;
  --font-stamp: 'Rye', cursive;
  --font-body: 'Vollkorn', serif;
  --font-mono: 'Space Mono', monospace;

  /* Layout */
  --max-width: 900px;
  --radius-soft: 3px;
}

@media (prefers-reduced-motion: no-preference) {
  :root { --motion-ok: 1; }
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.6;
  position: relative;
  overflow-x: hidden;
}

/* ---------------- Background texture & flight path ---------------- */

.paper-texture {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(92,79,63,0.05) 0, transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(92,79,63,0.05) 0, transparent 45%),
    repeating-linear-gradient(0deg, rgba(92,79,63,0.025) 0px, transparent 1px, transparent 3px);
  mix-blend-mode: multiply;
}

.flight-path-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.35;
}
.flight-path-bg svg { width: 100%; height: 100%; }
.flight-line {
  fill: none;
  stroke: var(--text-soft);
  stroke-width: 1.5;
  stroke-dasharray: 2 10;
  stroke-linecap: round;
  animation: flow-dash 8s linear infinite;
}
.flight-line--2 { stroke: var(--gold); }
.flight-line--vertical { stroke-dasharray: 2 16; opacity: 0.6; }
.flight-dot { fill: var(--stamp-red); opacity: 0.7; }
.flight-dot--2 { fill: var(--ink-green); }

@keyframes flow-dash {
  to { stroke-dashoffset: -120; }
}
@media (prefers-reduced-motion: reduce) {
  .flight-line { animation: none; }
}

main, header, footer, .modal-backdrop { position: relative; z-index: 1; }

/* ---------------- Little wireframe globe (Rusia → Perú route) ---------------- */

.globe {
  position: absolute;
  top: 6px;
  right: clamp(4px, 3vw, 28px);
  width: clamp(90px, 14vw, 150px);
  height: auto;
  opacity: 0.6;
  pointer-events: none;
}
.globe-line {
  fill: none;
  stroke: var(--ink-green);
  stroke-width: 1.2;
  opacity: 0.4;
}
.globe-route {
  fill: none;
  stroke: var(--stamp-red);
  stroke-width: 1.5;
  stroke-dasharray: 3 6;
  opacity: 0.8;
  animation: flow-dash 4s linear infinite;
}
.globe-dot { fill: var(--stamp-red); }
.globe-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.05em;
  fill: var(--text-soft);
}
.globe-plane path { fill: var(--ink-green); }

@media (prefers-reduced-motion: reduce) {
  .globe-route { animation: none; }
}

@media (max-width: 560px) {
  .globe { display: none; }
}

/* ---------------- Language switcher (bottom-left flag toggle) ---------------- */

.lang-switch {
  position: fixed;
  left: clamp(10px, 3vw, 22px);
  bottom: clamp(10px, 3vw, 22px);
  z-index: 30;
  display: flex;
  gap: 6px;
  background: var(--paper);
  border: 1.5px solid var(--paper-line);
  border-radius: 999px;
  padding: 5px;
  box-shadow: 0 6px 18px rgba(43,35,26,0.18);
}

.lang-btn {
  background: none;
  border: none;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  line-height: 1;
  cursor: pointer;
  opacity: 0.55;
  filter: grayscale(35%);
  transition: opacity 0.15s ease, filter 0.15s ease, background 0.15s ease, transform 0.15s ease;
}
.lang-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.lang-btn.is-active {
  opacity: 1;
  filter: none;
  background: var(--paper-deep);
  box-shadow: inset 0 0 0 1.5px var(--ink-green);
}

@media (max-width: 480px) {
  .lang-switch { padding: 4px; gap: 4px; }
  .lang-btn { width: 30px; height: 30px; font-size: 1rem; }
}

/* ---------------- Header ---------------- */

.site-header {
  padding: 22px clamp(16px, 5vw, 48px) 0;
}
.header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--paper-line);
  padding-bottom: 16px;
}
.compass-mark {
  width: 28px;
  height: 28px;
  color: var(--ink-green);
  flex-shrink: 0;
}
.compass-mark--small { width: 22px; height: 22px; margin-bottom: 8px; }

.header-wordmark {
  font-family: var(--font-stamp);
  color: var(--ink-green);
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin: 0;
}

.envelope-btn {
  position: relative;
  background: none;
  border: 1.5px solid var(--ink-green);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-green);
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}
.envelope-btn:hover { background: rgba(47,75,60,0.08); transform: rotate(-4deg); }
.envelope-btn:focus-visible { outline: 2px solid var(--stamp-red); outline-offset: 3px; }
.envelope-dot {
  position: absolute;
  top: 2px; right: 2px;
  width: 10px; height: 10px;
  background: var(--stamp-red);
  border-radius: 50%;
  border: 2px solid var(--paper);
}

/* ---------------- Hero / stamp ---------------- */

.hero {
  position: relative;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: clamp(40px, 8vw, 72px) clamp(16px, 5vw, 48px) 24px;
  text-align: center;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  letter-spacing: 0.35em;
  font-size: 0.75rem;
  color: var(--gold);
  margin: 0 0 6px;
}

.hero-title {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-style: italic;
  font-weight: 600;
  font-size: clamp(3rem, 9vw, 5.5rem);
  color: var(--ink-green);
  margin: 0;
  line-height: 1;
}

.hero-sub {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--text-soft);
  max-width: 46ch;
  margin: 14px auto 0;
}

/* The signature element: an imperfect circular ink stamp */
.stamp-wrap {
  position: relative;
  width: min(320px, 78vw);
  aspect-ratio: 1;
  margin: 44px auto 8px;
  color: var(--ink-green);
  transform: rotate(-3deg);
  animation: stamp-press 0.7s cubic-bezier(.2,1.3,.4,1) both;
}
@keyframes stamp-press {
  0% { opacity: 0; transform: rotate(-3deg) scale(1.5); filter: blur(1px); }
  60% { opacity: 1; }
  100% { opacity: 1; transform: rotate(-3deg) scale(1); filter: blur(0); }
}
@media (prefers-reduced-motion: reduce) {
  .stamp-wrap { animation: none; }
}

.stamp-badge {
  width: 100%;
  height: 100%;
  display: block;
}
.stamp-arc-text {
  font-family: var(--font-stamp);
  font-size: 15px;
  fill: currentColor;
  letter-spacing: 0.06em;
}
.stamp-arc-text--bottom { font-size: 12px; }

.stamp-content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transform: rotate(3deg); /* counter-rotate content so numbers read straight */
  padding: 20% 18%;
  text-align: center;
}

.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.countdown-cell { display: flex; flex-direction: column; align-items: center; }
.countdown-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: clamp(1.3rem, 4vw, 1.9rem);
  line-height: 1;
}
.countdown-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-top: 4px;
}
.countdown-caption {
  font-family: var(--font-stamp);
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  margin: 12px 0 0;
  color: var(--ink-green);
}

.arrived-msg p {
  margin: 0;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.6rem;
  color: var(--stamp-red);
}
.arrived-msg .arrived-sub {
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text-soft);
  margin-top: 6px;
}

.date-picker-shell {
  margin-top: 28px;
  display: flex;
  justify-content: center;
}

.date-picker-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  background: var(--paper-deep);
  border: 1.5px dashed var(--gold);
  border-radius: var(--radius-soft);
  padding: 18px 26px 20px;
  max-width: 280px;
}
.date-picker-form label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: var(--text-soft);
}
.date-picker-form input[type="date"] {
  font-family: var(--font-mono);
  border: 1px solid var(--ink-green);
  background: #fff;
  padding: 7px 9px;
  border-radius: var(--radius-soft);
  color: var(--text);
}
.date-picker-form button {
  font-family: var(--font-mono);
  background: var(--ink-green);
  color: var(--cream-on-green);
  border: none;
  padding: 8px 16px;
  border-radius: var(--radius-soft);
  cursor: pointer;
  font-size: 0.78rem;
  letter-spacing: 0.05em;
}
.date-picker-form button:hover { background: var(--ink-green-dk); }
.date-picker-hint {
  font-size: 0.68rem;
  color: var(--text-soft);
  margin: 2px 0 0;
  max-width: 26ch;
  text-align: center;
}

.hero-note {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-soft);
  opacity: 0.7;
  min-height: 1em;
}

/* ---------------- Photo section ---------------- */

.photos {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px clamp(16px, 5vw, 48px) 80px;
  text-align: center;
}

.section-stamp {
  display: inline-block;
  font-family: var(--font-stamp);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: var(--stamp-red);
  border: 1.5px dashed var(--stamp-red);
  padding: 5px 14px;
  border-radius: 999px;
  transform: rotate(-2deg);
  margin-bottom: 14px;
}

.section-title {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  color: var(--ink-green);
  margin: 0 0 32px;
}

.slider-shell { max-width: 560px; margin: 0 auto; }

.ba-empty {
  aspect-ratio: 4 / 5;
  border: 2px dashed var(--paper-line);
  border-radius: var(--radius-soft);
  background: var(--paper-deep);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 30px;
  color: var(--text-soft);
}
.ba-empty svg { color: var(--gold); opacity: 0.8; }
.ba-empty p {
  margin: 0;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1rem;
  text-align: center;
  color: var(--text);
}
.ba-empty-sub {
  font-family: var(--font-mono) !important;
  font-style: normal !important;
  font-size: 0.7rem !important;
  letter-spacing: 0.02em;
  max-width: 26ch;
  color: var(--text-soft) !important;
}

.ba-slider {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 5;
  border-radius: var(--radius-soft);
  overflow: hidden;
  box-shadow: 0 10px 0 -4px rgba(0,0,0,0.05), 0 18px 30px -12px rgba(43,35,26,0.35);
  background: var(--paper-deep);
  border: 6px solid #fff;
  outline: 1px solid var(--paper-line);
  user-select: none;
  touch-action: pan-y;
}

.ba-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

.ba-clip {
  position: absolute;
  inset: 0;
  width: 55%; /* JS updates this */
  overflow: hidden;
}
.ba-clip .ba-img { width: var(--slider-img-w, 100%); max-width: none; }

.ba-handle {
  position: absolute;
  top: 0; bottom: 0;
  left: 55%; /* JS updates this */
  width: 2px;
  background: var(--paper);
  cursor: ew-resize;
  transform: translateX(-1px);
}
.ba-handle-line { position: absolute; inset: 0; background: var(--paper); box-shadow: 0 0 0 1px rgba(43,35,26,0.4); }
.ba-handle-grip {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 34px; height: 34px;
  background: var(--paper);
  border: 1.5px solid var(--ink-green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-green);
  box-shadow: 0 2px 6px rgba(43,35,26,0.25);
}

.ba-tag {
  position: absolute;
  bottom: 12px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  background: rgba(237,227,207,0.9);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 2px;
  z-index: 2;
}
.ba-tag--before { left: 12px; }
.ba-tag--after { right: 12px; }

.slider-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-top: 16px;
}
.nav-arrow {
  background: none;
  border: 1.5px solid var(--ink-green);
  color: var(--ink-green);
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  transition: background 0.15s ease;
}
.nav-arrow:hover { background: rgba(47,75,60,0.08); }
.nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

.pair-dots { display: flex; gap: 7px; }
.pair-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--paper-line);
  border: none;
  padding: 0;
  cursor: pointer;
}
.pair-dot.is-active { background: var(--ink-green); }

.ba-caption {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--text-soft);
  font-size: 0.9rem;
  min-height: 1.4em;
  margin: 10px 0 0;
}

.add-photo-btn {
  margin-top: 18px;
  background: none;
  border: none;
  color: var(--text-soft);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  opacity: 0.75;
  padding: 4px 8px;
}
.add-photo-btn:hover { opacity: 1; color: var(--ink-green); }

/* ---------------- During-the-trip photo gallery ---------------- */

.photos-during {
  padding-top: 8px;
  border-top: 1px dashed var(--paper-line);
}

.gallery-shell { max-width: 720px; margin: 0 auto; }

.gallery-empty {
  aspect-ratio: 16 / 8;
  border: 2px dashed var(--paper-line);
  border-radius: var(--radius-soft);
  background: var(--paper-deep);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 30px;
  color: var(--text-soft);
}
.gallery-empty svg { color: var(--gold); opacity: 0.8; }
.gallery-empty p {
  margin: 0;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1rem;
  text-align: center;
  color: var(--text);
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.gallery-item {
  margin: 0;
  background: #fff;
  border: 6px solid #fff;
  outline: 1px solid var(--paper-line);
  border-radius: var(--radius-soft);
  box-shadow: 0 10px 20px -12px rgba(43,35,26,0.35);
  overflow: hidden;
  transform: rotate(var(--tilt, 0deg));
}
.gallery-item:nth-child(3n+1) { --tilt: -1.2deg; }
.gallery-item:nth-child(3n+2) { --tilt: 0.8deg; }
.gallery-item:nth-child(3n+3) { --tilt: -0.4deg; }

.gallery-item img {
  display: block;
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: cover;
}
.gallery-item figcaption {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.8rem;
  color: var(--text-soft);
  padding: 6px 8px 8px;
  text-align: center;
}

/* ---------------- Modals (shared) ---------------- */

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(43,35,26,0.45);
  backdrop-filter: blur(2px);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop[hidden] { display: none; }

.modal {
  background: var(--paper);
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-soft);
  box-shadow: 0 24px 60px rgba(43,35,26,0.35);
  padding: 28px 26px;
  max-width: 420px;
  width: 100%;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 10px; right: 12px;
  background: none;
  border: none;
  font-size: 1.4rem;
  line-height: 1;
  color: var(--text-soft);
  cursor: pointer;
}
.modal-close:hover { color: var(--stamp-red); }

.add-photo-modal h3 {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--ink-green);
  margin: 0 0 18px;
}

#addPhotoForm { display: flex; flex-direction: column; gap: 14px; }
.file-drop, .caption-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-soft);
  letter-spacing: 0.03em;
}
.file-drop input, .caption-field input {
  font-family: var(--font-body);
  font-size: 0.9rem;
  padding: 7px 8px;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-soft);
  background: #fff;
}

.primary-btn {
  font-family: var(--font-mono);
  background: var(--ink-green);
  color: var(--cream-on-green);
  border: none;
  padding: 10px 16px;
  border-radius: var(--radius-soft);
  cursor: pointer;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
}
.primary-btn:hover { background: var(--ink-green-dk); }
.primary-btn:disabled { opacity: 0.5; cursor: wait; }

.upload-status, .note-status {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-soft);
  min-height: 1.2em;
  margin: 0;
}

/* ---------------- Friend notes panel ---------------- */

.notes-panel {
  margin-left: auto;
  background: var(--paper);
  height: 100%;
  max-height: 640px;
  width: min(400px, 100%);
  border-radius: var(--radius-soft);
  border: 1px solid var(--paper-line);
  box-shadow: 0 24px 60px rgba(43,35,26,0.35);
  padding: 26px 22px 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  animation: panel-slide 0.35s ease both;
}
@keyframes panel-slide {
  from { transform: translateX(24px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) { .notes-panel { animation: none; } }

.notes-panel h3 {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--ink-green);
  margin: 0 0 2px;
}
.notes-sub {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-soft);
  margin: 0 0 16px;
}

.notes-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-right: 4px;
  margin-bottom: 16px;
}

.postcard {
  background: var(--paper-deep);
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  padding: 12px 14px;
  position: relative;
  transform: rotate(var(--tilt, -0.6deg));
  box-shadow: 0 2px 5px rgba(43,35,26,0.12);
}
.postcard::before {
  content: "";
  position: absolute;
  top: 8px; right: 10px;
  width: 22px; height: 22px;
  border: 1.5px dashed var(--gold);
  border-radius: 50%;
  opacity: 0.6;
}
.postcard-name {
  font-family: var(--font-stamp);
  font-size: 0.85rem;
  color: var(--ink-green);
  margin: 0 0 4px;
}
.postcard-message {
  font-family: var(--font-body);
  font-size: 0.92rem;
  margin: 0;
  color: var(--text);
  padding-right: 26px;
}
.postcard-empty {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--text-soft);
  text-align: center;
  padding: 24px 0;
}

.note-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px dashed var(--paper-line);
  padding-top: 14px;
}
.note-form input, .note-form textarea {
  font-family: var(--font-body);
  font-size: 0.92rem;
  padding: 8px 9px;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius-soft);
  background: #fff;
  resize: vertical;
}

/* ---------------- Footer ---------------- */

.site-footer {
  text-align: center;
  padding: 30px 20px 50px;
  color: var(--text-soft);
}
.site-footer p {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  margin: 0;
}

/* ---------------- Scroll reveal ---------------- */

.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
}

/* ---------------- Paper plane (notes button micro-interaction) ---------------- */

.paper-plane {
  position: fixed;
  top: 0;
  left: 0;
  width: 22px;
  height: 22px;
  color: var(--ink-green);
  pointer-events: none;
  z-index: 40;
  will-change: transform, opacity;
}

/* ---------------- Focus visibility ---------------- */

a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--stamp-red);
  outline-offset: 2px;
}

/* ---------------- Small screens ---------------- */

@media (max-width: 480px) {
  .header-wordmark { display: none; }
  .modal-backdrop { padding: 0; }
  .notes-panel { max-height: 100%; height: 100%; border-radius: 0; }
}

/* ===================================================================
   FEATURE ADDITIONS
   Scroll-progress dots · polaroids · dashed trail · notes marquee ·
   uploadable trip polaroids. All built on the existing token system.
   =================================================================== */

/* ---------------- Feature 2 · Scroll-progress dots (mid-left) ------ */

.scroll-progress {
  position: fixed;
  left: clamp(6px, 2vw, 22px);
  top: 50%;
  transform: translateY(-50%);
  z-index: 15;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}
.scroll-progress[hidden] { display: none; }

/* A little vertical "passport pill" that inks in as you reach its
   section — echoing the stamp motif rather than a plain dot. */
.progress-dot {
  --fill: 0;
  width: 15px;
  height: 30px;
  padding: 0;
  border: 1.5px solid var(--ink-green);
  border-radius: 999px;
  background:
    linear-gradient(to top, var(--ink-green) 0%, var(--ink-green) 100%) bottom / 100% calc(var(--fill) * 100%) no-repeat,
    rgba(237, 227, 207, 0.55);
  cursor: pointer;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background-size 0.45s cubic-bezier(.4,.6,.3,1);
}
.progress-dot::after {
  content: "";
  position: absolute;
  top: 50%; left: 50%;
  width: 4px; height: 4px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: var(--stamp-red);
  opacity: 0.75;
  transition: background 0.3s ease, opacity 0.3s ease;
}
.progress-dot.is-filled {
  --fill: 1;
  box-shadow: 0 3px 10px -3px rgba(31, 51, 42, 0.5);
}
.progress-dot.is-filled::after { background: var(--paper); opacity: 0.95; }
.progress-dot:hover { transform: scale(1.08); }

@media (prefers-reduced-motion: reduce) {
  .progress-dot { transition: none; }
}
@media (max-width: 460px) {
  .scroll-progress { gap: 10px; }
  .progress-dot { width: 12px; height: 24px; }
}

/* ---------------- Shared polaroid frame ---------------------------- */

.polaroid {
  margin: 0;
  background: #fff;
  padding: 10px 10px 0;
  outline: 1px solid var(--paper-line);
  border-radius: var(--radius-soft);
  box-shadow: 0 12px 26px -14px rgba(43, 35, 26, 0.45);
  transform: rotate(var(--tilt, 0deg));
}
.polaroid > img {
  display: block;
  width: 100%;
  height: auto;
  background: var(--paper-deep);
}
.polaroid-caption {
  font-family: var(--font-body);
  font-size: 0.82rem;
  line-height: 1.4;
  color: var(--text-soft);
  text-align: center;
  padding: 9px 6px 13px;
  margin: 0;
}

/* ---------------- Feature 1 · Meet our traveller ------------------- */

.traveller-trail {
  position: relative;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: clamp(30px, 6vw, 54px);
  padding: 8px 0 4px;
}

/* The dashed connectors are an SVG overlay drawn by js/sections.js. */
.trail-lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
  z-index: 0;
}
.trail-line {
  fill: none;
  stroke: var(--text-soft);
  stroke-width: 1.5;
  stroke-dasharray: 2 9;
  stroke-linecap: round;
  opacity: 0.65;
  animation: flow-dash 9s linear infinite;
}
@media (prefers-reduced-motion: reduce) { .trail-line { animation: none; } }

.polaroid-wish {
  position: relative;
  z-index: 1;
  width: min(66%, 300px);
}
/* Alternate side + tilt so the trail feels hand-placed, not stacked. */
.traveller-trail .polaroid-wish:nth-child(odd)  { align-self: flex-start; --tilt: -2.4deg; }
.traveller-trail .polaroid-wish:nth-child(even) { align-self: flex-end;   --tilt:  2.1deg; }
.traveller-trail .polaroid-wish:nth-child(4n+3) { --tilt: -1.4deg; }
.traveller-trail .polaroid-wish:nth-child(4n)   { --tilt:  1.5deg; }

.meet-traveller .polaroid-caption {
  font-size: 0.9rem;
  font-style: italic;
  color: var(--text);
  padding: 11px 8px 16px;
}

@media (max-width: 460px) {
  .polaroid-wish { width: 82%; }
}

/* ---------------- Feature 5 · Notes marquee ----------------------- */

.notes-marquee-section {
  margin: 8px 0 12px;
  padding: 20px 0;
  border-top: 1px dashed var(--paper-line);
  border-bottom: 1px dashed var(--paper-line);
  background: rgba(227, 213, 184, 0.28);
}
.marquee-viewport {
  overflow: hidden;
  width: 100%;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
  mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
}
.marquee-track {
  display: flex;
  width: max-content;
  animation: marquee-scroll 42s linear infinite;
}
.marquee-track:hover { animation-play-state: paused; }
.marquee-set {
  display: flex;
  gap: 16px;
  padding-right: 16px;
  flex: 0 0 auto;
}
.marquee-note {
  flex: 0 0 auto;
  max-width: 300px;
  background: var(--paper);
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  box-shadow: 0 2px 5px rgba(43, 35, 26, 0.12);
  padding: 10px 14px;
  transform: rotate(var(--n-tilt, -0.5deg));
}
.marquee-note:nth-child(even) { --n-tilt: 0.6deg; }
.marquee-note-msg {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.9rem;
  color: var(--text);
  margin: 0 0 3px;
}
.marquee-note-name {
  font-family: var(--font-stamp);
  font-size: 0.72rem;
  color: var(--ink-green);
  margin: 0;
  text-align: right;
}
.marquee-empty {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-soft);
  margin: 0;
}
@keyframes marquee-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@media (prefers-reduced-motion: reduce) {
  .marquee-track { animation: none; flex-wrap: wrap; justify-content: center; }
  .marquee-viewport { -webkit-mask-image: none; mask-image: none; }
}

/* ---------------- Feature 4 · Uploadable trip polaroids ------------ */

.trip-shell { max-width: 760px; margin: 0 auto; }

.trip-empty {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--text-soft);
  margin: 0 0 14px;
}

.trip-scroller {
  display: flex;
  gap: clamp(14px, 3vw, 22px);
  align-items: flex-start;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 14px 6px 22px;
  scrollbar-width: thin;
}
.trip-scroller::-webkit-scrollbar { height: 6px; }
.trip-scroller::-webkit-scrollbar-thumb {
  background: var(--paper-line);
  border-radius: 999px;
}

.trip-polaroid {
  flex: 0 0 clamp(150px, 42vw, 184px);
  scroll-snap-align: center;
}
.trip-polaroid > img { max-height: 320px; object-fit: cover; }

/* The trailing "add a photo" slot — an empty dashed polaroid. */
button.trip-add-slot {
  cursor: pointer;
  font: inherit;
  color: var(--text-soft);
  outline: 1px dashed var(--gold);
  box-shadow: none;
  transition: color 0.15s ease, outline-color 0.15s ease;
}
button.trip-add-slot:hover { color: var(--ink-green); outline-color: var(--ink-green); }
.trip-add-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  aspect-ratio: 4 / 5;
  background: var(--paper-deep);
  border-radius: 2px;
}
.trip-add-label {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  letter-spacing: 0.04em;
  max-width: 14ch;
  text-align: center;
  line-height: 1.3;
}

.trip-controls { margin-top: 4px; }
.trip-counter {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--text-soft);
  min-width: 8ch;
  text-align: center;
}
.trip-full-note {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--gold);
  margin: 10px 0 0;
}

</style>
</head>

<!-- BEFORE THE TRIP: BEFORE/AFTER PHOTOS -->
<template data-section="photosBefore">
  <section class="photos" id="photosBefore">
    <div class="section-stamp reveal" aria-hidden="true" data-i18n="beforeStamp">ANTES DEL VIAJE</div>
    <h2 class="section-title reveal" data-i18n="beforeTitle">Cómo has crecido</h2>

    <div class="slider-shell reveal">
      <div class="ba-empty" id="baEmpty">
        <svg viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
          <rect x="4" y="10" width="40" height="30" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="15" cy="20" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M4 34 L16 24 L24 30 L32 20 L44 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p data-i18n="beforeEmptyText">aún no hay fotos de antes/después</p>
        <p class="ba-empty-sub" data-i18n="beforeEmptySub">sube el primer par cuando lo tengas — un antes y un después juntos</p>
      </div>

      <div class="ba-slider" id="baSlider" hidden>
        <img class="ba-img ba-img--after" id="baAfterImg" src="" alt="">
        <div class="ba-clip" id="baClip">
          <img class="ba-img ba-img--before" id="baBeforeImg" src="" alt="">
        </div>
        <div class="ba-handle" id="baHandle">
          <div class="ba-handle-line"></div>
          <div class="ba-handle-grip">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 6 L2 12 L8 18 M16 6 L22 12 L16 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <span class="ba-tag ba-tag--before" data-i18n="tagBefore">ANTES</span>
        <span class="ba-tag ba-tag--after" data-i18n="tagAfter">DESPUÉS</span>
      </div>

      <div class="slider-controls" id="sliderControls" hidden>
        <button class="nav-arrow" id="prevPairBtn" data-i18n-aria="prevPairAria" aria-label="Par anterior">&#8592;</button>
        <div class="pair-dots" id="pairDots"></div>
        <button class="nav-arrow" id="nextPairBtn" data-i18n-aria="nextPairAria" aria-label="Siguiente par">&#8594;</button>
      </div>
      <p class="ba-caption" id="baCaption"></p>

      <button class="add-photo-btn" id="addPhotoBtn" data-i18n-title="addPhotoBtnTitle" title="Agregar una foto">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5 L12 19 M5 12 L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span data-i18n="addPhotoBtn">agregar foto</span>
      </button>
    </div>
  </section>
</template>

<!-- DURING THE TRIP: UPLOADABLE POLAROIDS (Feature 4) -->
<template data-section="photosDuring">
  <section class="photos photos-during" id="photosDuring">
    <div class="section-stamp reveal" aria-hidden="true" data-i18n="duringStamp">DURANTE EL VIAJE</div>
    <h2 class="section-title reveal" data-i18n="duringTitle">El viaje en fotos</h2>

    <div class="trip-shell reveal">
      <p class="trip-empty" data-i18n="duringEmptyText" hidden>aún no hay fotos del viaje</p>

      <!-- Polaroids (and the trailing "add" slot) are injected here by app.js -->
      <div class="trip-scroller" id="tripScroller"></div>

      <div class="slider-controls trip-controls">
        <button class="nav-arrow trip-prev" data-i18n-aria="prevPhotoAria" aria-label="Fotos anteriores">&#8592;</button>
        <span class="trip-counter"></span>
        <button class="nav-arrow trip-next" data-i18n-aria="nextPhotoAria" aria-label="Fotos siguientes">&#8594;</button>
      </div>

      <p class="trip-full-note" data-i18n="tripFullNote" hidden>ya están las 21 fotos — ¡el rollo está completo!</p>
    </div>
  </section>
</template>

<!-- ============ ADD BEFORE/AFTER PAIR MODAL ============ -->
<div class="modal-backdrop" id="addPhotoBackdrop" hidden>
  <div class="modal add-photo-modal" role="dialog" aria-modal="true" aria-labelledby="addPhotoTitle">
    <button class="modal-close" id="closeAddPhoto" data-i18n-aria="closeAria" aria-label="Cerrar">&times;</button>
    <h3 id="addPhotoTitle" data-i18n="addPairModalTitle">Añade un par de fotos</h3>
    <form id="addPhotoForm">
      <label class="file-drop">
        <span data-i18n="beforeFileLabel">Foto "antes"</span>
        <input type="file" accept="image/*" id="beforeFileInput" required>
      </label>
      <label class="file-drop">
        <span data-i18n="afterFileLabel">Foto "después"</span>
        <input type="file" accept="image/*" id="afterFileInput" required>
      </label>
      <label class="caption-field">
        <span data-i18n="captionLabel">Nota breve (opcional)</span>
        <input type="text" id="pairCaptionInput" maxlength="80" data-i18n-placeholder="pairCaptionPlaceholder" placeholder="ej. de la ventana a las nubes">
      </label>
      <button type="submit" class="primary-btn" id="uploadPairBtn" data-i18n="uploadPairBtn">Subir par</button>
      <p class="upload-status" id="uploadStatus" aria-live="polite"></p>
    </form>
  </div>
</div>

<!-- ============ ADD DURING-TRIP PHOTO MODAL ============ -->
<div class="modal-backdrop" id="addDuringPhotoBackdrop" hidden>
  <div class="modal add-photo-modal" role="dialog" aria-modal="true" aria-labelledby="addDuringPhotoTitle">
    <button class="modal-close" id="closeAddDuringPhoto" data-i18n-aria="closeAria" aria-label="Cerrar">&times;</button>

    <form id="addDuringPhotoForm">
      <label class="file-drop">
        <span data-i18n="duringFileLabel">Foto</span>
        <input type="file" accept="image/*" id="duringFileInput" required>
      </label>
      <label class="caption-field">
        <span data-i18n="captionLabel">Nota breve (opcional)</span>
        <input type="text" id="duringCaptionInput" maxlength="80" data-i18n-placeholder="duringCaptionPlaceholder" placeholder="ej. Machu Picchu al amanecer">
      </label>
      <button type="submit" class="primary-btn" id="uploadDuringBtn" data-i18n="uploadDuringBtn">Subir foto</button>
      <p class="upload-status" id="uploadDuringStatus" aria-live="polite"></p>
    </form>
  </div>

const SUPPORTED_LANGS = ["es", "en", "ru"];
const LANG_STORAGE_KEY = "notasViajeLang";

function getCurrentLang() {
  const stored = localStorage.getItem(LANG_STORAGE_KEY);
  return SUPPORTED_LANGS.includes(stored) ? stored : "es";
}

// t(key) — used by app.js for dynamically-generated strings (status
// messages, postcard fallback names, etc.) that live outside the
// data-i18n-attributed DOM elements.
function t(key) {
  const lang = getCurrentLang();
  return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.es[key] || key;
}

function applyLanguage(lang) {
  if (!SUPPORTED_LANGS.includes(lang)) lang = "es";
  localStorage.setItem(LANG_STORAGE_KEY, lang);
  const dict = TRANSLATIONS[lang];

  document.documentElement.lang = lang;

  const pageTitleEl = document.getElementById("pageTitle");
  if (pageTitleEl) pageTitleEl.textContent = dict.pageTitle;
  const pageDescEl = document.getElementById("pageDescription");
  if (pageDescEl) pageDescEl.setAttribute("content", dict.pageDescription);

  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (dict[key] !== undefined) el.setAttribute("placeholder", dict[key]);
  });
  document.querySelectorAll("[data-i18n-aria]").forEach((el) => {
    const key = el.getAttribute("data-i18n-aria");
    if (dict[key] !== undefined) el.setAttribute("aria-label", dict[key]);
  });
  document.querySelectorAll("[data-i18n-title]").forEach((el) => {
    const key = el.getAttribute("data-i18n-title");
    if (dict[key] !== undefined) el.setAttribute("title", dict[key]);
  });

  document.querySelectorAll(".lang-btn").forEach((btn) => {
    btn.classList.toggle("is-active", btn.getAttribute("data-lang") === lang);
  });

  // Let the rest of the app (countdown source note, live-loaded
  // notes/photos, etc.) know the language changed so it can re-render
  // any text it owns dynamically rather than through data-i18n.
  document.dispatchEvent(new CustomEvent("langchange", { detail: { lang } }));
}

document.addEventListener("DOMContentLoaded", () => {
  applyLanguage(getCurrentLang());
  document.querySelectorAll(".lang-btn").forEach((btn) => {
    btn.addEventListener("click", () => applyLanguage(btn.getAttribute("data-lang")));
  });
});
